services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: careeros
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d careeros"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    profiles: [full]
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["sh", "-c", "./migrate up && ./api"]
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/careeros?sslmode=disable
      REDIS_URL: redis://redis:6379
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    profiles: [full]
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["./worker"]
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/careeros?sslmode=disable
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-data:
